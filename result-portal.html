<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Portal | Savvy Scholars Tutors Jamb Mock</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #6366f1; --success: #22c55e; --danger: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; }
        .score-box { background: #f8fafc; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #e2e8f0; }
        .subject-tag { display: inline-block; padding: 4px 12px; background: #e0e7ff; color: #4338ca; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .script-item { border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .correct { border-left: 5px solid var(--success); background: #f0fdf4; }
        .wrong { border-left: 5px solid var(--danger); background: #fef2f2; }
        .btn-print { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container" id="printableContent">
    <div id="loader">Loading your results...</div>
    
    <div id="resultContent" style="display: none;">
        <button class="btn-print" id="printBtn" onclick="generateResultSlip()">📥 Download Official Result Slip (PDF)</button>
        
        <div class="header">
            <div>
                <h1 style="margin: 0; color: #1e293b;">Performance Report</h1>
                <p id="examTitle" style="color: #64748b; font-size: 1.1rem;"></p>
            </div>
            <div style="text-align: right;">
                <h3 id="studentName" style="margin: 0;"></h3>
                <p id="regNo" style="color: #64748b; margin: 5px 0;"></p>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0;">
            <div class="score-box">
                <p style="color: #64748b; margin: 0;">Aggregate Score</p>
                <h2 id="aggregateScore" style="font-size: 3rem; margin: 10px 0; color: #1e293b;"></h2>
            </div>
            <div class="score-box" style="text-align: left;">
                <p style="color: #64748b; margin-bottom: 10px;">Subject Breakdown</p>
                <div id="subjectBreakdown"></div>
            </div>
        </div>

        <h2 style="border-top: 1px solid #e2e8f0; pt: 20px;">Detailed Script Analysis</h2>
        <div id="scriptContainer"></div>
    </div>
</div>

<script>
    const BASE_URL =  "https://cbt-backend-mgqe.onrender.com"; 
    const urlParams = new URLSearchParams(window.location.search);
    const resultId = urlParams.get('id');

    async function loadResult() {
        if (!resultId) return alert("No result ID found.");

        try {
            const res = await fetch(`${BASE_URL}/results/${resultId}`);
            const data = await res.json();

            document.getElementById('loader').style.display = 'none';
            document.getElementById('resultContent').style.display = 'block';

            // Fill basic info
            document.getElementById('examTitle').innerText = data.examTitle;
            document.getElementById('studentName').innerText = data.studentName;
            document.getElementById('regNo').innerText = `Reg No: ${data.regNo}`;
            document.getElementById('aggregateScore').innerText = `${data.totalScore}%`;

            // Subject breakdown
            // Subject breakdown with visual progress bars
document.getElementById('subjectBreakdown').innerHTML = data.subjectScores.map(s => {
    // Determine color based on performance
    let barColor = s.score >= 70 ? '#22c55e' : (s.score >= 45 ? '#eab308' : '#ef4444');
    
    return `
        <div style="margin-bottom: 15px;">
            <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 4px;">
                <span>${s.subject}</span>
                <span style="font-weight: bold;">${s.score}%</span>
            </div>
            <div style="width: 100%; background: #e2e8f0; height: 8px; border-radius: 10px; overflow: hidden;">
                <div style="width: ${s.score}%; background: ${barColor}; height: 100%; border-radius: 10px;"></div>
            </div>
            <div style="font-size: 0.7rem; color: #94a3b8; margin-top: 2px;">
                Time Spent: ${Math.floor(s.timeSpent / 60)}m ${s.timeSpent % 60}s
            </div>
        </div>
    `;
}).join('');

            // Detailed Script
            document.getElementById('scriptContainer').innerHTML = data.detailedAnswers.map((ans, i) => `
                <div class="script-item ${ans.isCorrect ? 'correct' : 'wrong'}">
                    <div style="font-weight: bold; margin-bottom: 8px;">Q${i+1}. ${ans.questionText}</div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; font-size: 0.9rem;">
                        <div><b>Your Answer:</b> ${ans.userChoice || 'Skipped'}</div>
                        <div><b>Correct Answer:</b> ${ans.correctKey}</div>
                    </div>
                </div>
            `).join('');

        } catch (err) {
            document.getElementById('loader').innerText = "Error loading result. Please check the link.";
        }
    }

    async function generateResultSlip() {
        const btn = document.getElementById('printBtn');
        btn.style.display = 'none'; // Hide button for PDF
        
        const element = document.getElementById('printableContent');
        const canvas = await html2canvas(element, { scale: 2 });
        const imgData = canvas.toDataURL('image/png');
        
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const imgProps = pdf.getImageProperties(imgData);
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
        
        pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
        pdf.save(`Result_Slip_${resultId}.pdf`);
        
        btn.style.display = 'block'; // Bring button back
    }

    loadResult();
</script>
</body>
</html>
