<div id="loginPage" class="auth-container">

    </div>
    <div style="text-align: left;">
        <label>Registration Number</label>
        <input type="text" id="regNumber" placeholder="e.g. STT203455AB">

    </div>
    <button class="btn-main" style="margin-top: 20px;" id="loginBtn" onclick="handleLogin()">
        LOGIN TO START EXAM
    </button>
    
    <p id="loginError" style="color: var(--accent); font-size: 0.8rem; margin-top: 10px;"></p>
</div>

<div id="dashboardPage" class="hidden auth-container">
    <div class="card">
        <h3>Welcome, <span id="dashName"></span></h3>
        <p><strong>Reg No:</strong> <span id="dashReg"></span></p>
        <div style="background: #f0f9ff; padding: 15px; border-radius: 8px; margin: 20px 0; text-align: left;">
            <p><strong>Available Exam:</strong> <span id="examName"></span></p>
            <p><strong>Duration:</strong> <span id="examDur"></span> Minutes</p>
            <p><strong>Subjects:</strong> <span id="examSubs"></span></p>
        </div>
        <button class="btn-main" id="startExamBtn" onclick="initiateExam()">START EXAMINATION NOW</button>
    </div>
</div>

<div id="examPage" class="hidden">
    <div class="subject-tabs" id="subjectTabs"></div>
    
    <div class="exam-layout">
        <main>
            <div class="question-card" id="questionArea">
                <p>Loading questions...</p>
            </div>
            <div style="margin-top: 20px; display: flex; justify-content: space-between;">
                <button class="btn-main" style="width: 120px;" onclick="prevQuestion()">Previous</button>
                <button class="btn-main" style="width: 120px;" onclick="nextQuestion()">Next</button>
            </div>
        </main>

        <aside class="nav-panel">
            <h4>Question Palette</h4>
            <div class="q-grid" id="questionGrid"></div>
            <hr>
            <button class="btn-main" style="background: #e74c3c;" onclick="confirmSubmit()">SUBMIT EXAM</button>
        </aside>
    </div>
</div>

<div id="resultPage" class="hidden">
    <div class="result-container">
        <h2>Examination Result</h2>
        <div id="scoreCircle" style="font-size: 3rem; color: #1abc9c; margin: 20px 0;"></div>
        <table id="resultTable">
            <thead>
                <tr><th>Subject</th><th>Score</th></tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
        <button class="btn-main" onclick="location.reload()">Take Another Mock</button>
    </div>
</div>

<script>
    const BASE_URL = "https://cbt-backend-mgqe.onrender.com"; 
    
    let state = {
        user: null,
        examId: null,
        userId: null,
        allQuestions: [], 
        currentSubIndex: 0,
        currentQIndex: 0,
        answers: {}, 
        timeLeft: 0,
        timerInterval: null
    };

async function handleLogin() {
    const regNumber = document.getElementById('regNumber').value.trim();
    const password = document.getElementById('password').value.trim();
    const errorEl = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');

    if(!regNumber || !password) return alert("Please enter both credentials");

    btn.innerText = "Authenticating...";
    btn.disabled = true;

    try {
        const res = await fetch(`${BASE_URL}/login`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ regNumber, password })
        });

        const data = await res.json();

        if (!res.ok) {
            errorEl.innerText = data.message || "Login failed";
            btn.innerText = "LOGIN TO START EXAM";
            btn.disabled = false;
            return;
        }

        // CORRECT MAPPING based on your server.js response
        state.userId = data.userId;
        state.examId = data.examId;
        
        // Update UI
        document.getElementById('dashName').innerText = `${data.firstName} ${data.lastName}`;
        document.getElementById('dashReg').innerText = data.regNumber;
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('dashboardPage').classList.remove('hidden');

    } catch (err) {
        console.error(err);
        errorEl.innerText = "Server connection failed.";
        btn.disabled = false;
    }
}

    async function initiateExam() {
    const startBtn = document.getElementById('startExamBtn');
    startBtn.innerText = "Loading Questions...";
    startBtn.disabled = true;

    try {
        // 1. Create the Exam Session in Backend
        const res = await fetch(`${BASE_URL}/login`, { // Or a specific /start-exam route if you created one
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ regNumber: state.user.regNumber, password: state.user.password })
        });
        const data = await res.json();
        
        // 2. Set the global examId
        state.examId = data.examId; 

        // 3. Fetch the randomized questions
        const qRes = await fetch(`${BASE_URL}/fetch-questions/${state.examId}`);
        const questionsData = await qRes.json();
        
        if (!qRes.ok) throw new Error("Could not load questions");

        state.allQuestions = questionsData;
        
        // 4. Switch UI
        document.getElementById('dashboardPage').classList.add('hidden');
        document.getElementById('examPage').classList.remove('hidden');
        
        // 5. Initialize Exam UI
        renderTabs();
        renderQuestion();
        startTimer(); // Ensure this function exists!
        
    } catch (err) {
        console.error("Start Exam Error:", err);
        alert("Failed to start exam. Check console for details.");
        startBtn.disabled = false;
        startBtn.innerText = "START EXAMINATION NOW";
    }
}
    

    function renderTabs() {
        const container = document.getElementById('subjectTabs');
        container.innerHTML = state.allQuestions.map((item, idx) => `
            <div class="tab ${idx === state.currentSubIndex ? 'active-tab' : ''}" onclick="switchSubject(${idx})">
                ${item.subject}
            </div>
        `).join('');
    }

    function switchSubject(idx) {
        state.currentSubIndex = idx;
        state.currentQIndex = 0;
        renderTabs();
        renderQuestion();
    }

    function renderQuestion() {
        const subjectData = state.allQuestions[state.currentSubIndex];
        if (!subjectData || !subjectData.questions.length) {
            document.getElementById('questionArea').innerHTML = "No questions found for this subject.";
            return;
        }

        const q = subjectData.questions[state.currentQIndex];
        const questionArea = document.getElementById('questionArea');

        let html = `
            <small>Subject: ${subjectData.subject} | Question ${state.currentQIndex + 1}</small>
            <div style="font-size: 1.2rem; margin: 20px 0;">${q.questionText}</div>
        `;

        if(q.questionImage) {
            html += `<img src="${q.questionImage}" style="max-width:100%; height:auto; margin-bottom:15px; border-radius:5px;">`;
        }

        q.options.forEach(opt => {
            const isSelected = state.answers[q._id] === opt.key;
            html += `
                <div class="option ${isSelected ? 'selected' : ''}" onclick="saveAnswer('${q._id}', '${opt.key}')">
                    <span class="opt-key">${opt.key}</span>
                    <span>${opt.value}</span>
                    ${opt.optionImage ? `<br><img src="${opt.optionImage}" style="max-height:100px; margin-top:5px;">` : ''}
                </div>
            `;
        });

        questionArea.innerHTML = html;
        renderGrid();
        
        // Trigger MathJax to render any LaTeX
        if (window.MathJax) MathJax.typesetPromise();
    }

    function renderGrid() {
        const questions = state.allQuestions[state.currentSubIndex].questions;
        const grid = document.getElementById('questionGrid');
        grid.innerHTML = questions.map((q, i) => `
            <div class="q-circle ${state.answers[q._id] ? 'answered' : ''} ${i === state.currentQIndex ? 'current' : ''}" 
                 onclick="jumpTo(${i})">${i + 1}</div>
        `).join('');
    }

    async function saveAnswer(qId, key) {
        state.answers[qId] = key;
        renderQuestion();
        
        // Silent background save
        try {
            await fetch(`${BASE_URL}/save-answer`, {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify({ examId: state.examId, questionId: qId, selectedOptionKey: key })
            });
        } catch (e) { console.error("Auto-save failed", e); }
    }

    function jumpTo(i) { state.currentQIndex = i; renderQuestion(); }
    
    function nextQuestion() { 
        if(state.currentQIndex < state.allQuestions[state.currentSubIndex].questions.length - 1) {
            state.currentQIndex++; renderQuestion();
        }
    }
    
    function prevQuestion() {
        if(state.currentQIndex > 0) {
            state.currentQIndex--; renderQuestion();
        }
    }

    function startTimer() {
        const timerEl = document.getElementById('timer');
        state.timerInterval = setInterval(() => {
            state.timeLeft--;
            if(state.timeLeft <= 0) {
                clearInterval(state.timerInterval);
                autoSubmit();
            }
            let h = Math.floor(state.timeLeft / 3600);
            let m = Math.floor((state.timeLeft % 3600) / 60);
            let s = state.timeLeft % 60;
            timerEl.innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }, 1000);
    }

    async function confirmSubmit() {
        if(!confirm("Are you sure you want to end the exam?")) return;
        submitProcess();
    }

    async function autoSubmit() {
        alert("Time is up! Your exam is being submitted automatically.");
        submitProcess();
    }

    async function submitProcess() {
    // Show a "Processing Result..." overlay so user doesn't click away
    showLoadingOverlay(true); 
    
    try {
        const res = await fetch(`${BASE_URL}/submit-exam`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ 
                examId: state.examId,
                finalTimeLeft: state.timeLeft // Pass this for analytics
            })
        });

        if (!res.ok) throw new Error("Server rejected submission");

        const result = await res.json();
        showResults(result);
    } catch (e) {
        alert("Submission Error: Your answers are safe, but we couldn't calculate the score. Please contact the Admin.");
    } finally {
        showLoadingOverlay(false);
    }
}

    function showResults(data) {
        document.getElementById('examPage').classList.add('hidden');
        document.getElementById('resultPage').classList.remove('hidden');
        document.getElementById('scoreCircle').innerText = `${data.aggregateScore} / 400`;
        
        const body = document.getElementById('resultBody');
        body.innerHTML = data.subjectResults.map(r => `
            <tr>
                <td>${r.subjectName}</td>
                <td>${r.weightedScore} / 100 <br><small>(${r.correctCount} correct)</small></td>
            </tr>
        `).join('');
    }
</script>
