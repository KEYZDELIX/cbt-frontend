<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SST JAMB MOCK 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">STT <strong>JAMB</strong> MOCK (1) 2026</div>
    <div class="timer-box" id="timer">02:00:00</div>
    <div id="userDisplayName" style="font-size: 0.9rem;"></div>
</header>

<div id="loginPage" class="auth-container">
    <div style="margin-bottom: 20px;">
        <img src="https://via.placeholder.com/80" alt="Logo" style="border-radius: 50%;">
        <h2>JAMB Portal Login</h2>
    </div>
    <div style="text-align: left;">
        <label>Registration Number</label>
        <input type="text" id="regNumber" placeholder="e.g. STT2026100555AB">
        
        <label>Password / PIN</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>
    <button class="btn-main" style="margin-top: 20px;" id="loginBtn" onclick="handleLogin()">
        LOGIN TO START EXAM
    </button>
    
    <p id="loginError" style="color: var(--accent); font-size: 0.8rem; margin-top: 10px;"></p>
</div>

<div id="examPage" class="hidden">
    <div class="subject-tabs" id="subjectTabs"></div>
    
    <div class="exam-layout">
        <main>
            <div class="question-card" id="questionArea">
                </div>
            <div style="margin-top: 20px; display: flex; justify-content: space-between;">
                <button class="btn-main" style="width: 120px;" onclick="prevQuestion()">Previous</button>
                <button class="btn-main" style="width: 120px;" onclick="nextQuestion()">Next</button>
            </div>
        </main>

        <aside class="nav-panel">
            <h4>Question Palette</h4>
            <div class="q-grid" id="questionGrid"></div>
            <hr>
            <button class="btn-main" style="background: var(--accent);" onclick="confirmSubmit()">SUBMIT EXAM</button>
        </aside>
    </div>
</div>

<div id="resultPage" class="hidden">
    <div class="result-container">
        <h2>Examination Result</h2>
        <div id="scoreCircle" style="font-size: 3rem; color: var(--secondary); margin: 20px 0;"></div>
        <table id="resultTable">
            <thead>
                <tr><th>Subject</th><th>Score</th></tr>
            </thead>
            <tbody id="resultBody"></tbody>
        </table>
        <button class="btn-main" onclick="location.reload()">Take Another Mock</button>
    </div>
</div>

<script>
    const BASE_URL = "https://cbt-backend-mgqe.onrender.com"; // Update to your Render URL
    let state = {
        examId: null,
        userId: null,
        allQuestions: [], // Organized by subject
        currentSubIndex: 0,
        currentQIndex: 0,
        answers: {}, // { questionId: selectedKey }
        timeLeft: 120 * 60
    };
async function handleLogin() {
    const regNumber = document.getElementById('regNumber').value;
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');

    if(!regNumber || !password) return alert("Please enter both Reg Number and Password");

    btn.innerText = "Authenticating...";
    btn.disabled = true;

    try {
        const res = await fetch(`${BASE_URL}/login`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ regNumber, password })
        });

        const data = await res.json();

        if (res.status !== 200) {
            errorEl.innerText = data.message;
            btn.innerText = "LOGIN TO START EXAM";
            btn.disabled = false;
            return;
        }

        // Successfully Logged In
        state.examId = data.examId;
        state.userId = data.userId;

        // Fetch Questions for this user's specific subject combination
        const qRes = await fetch(`${BASE_URL}/fetch-questions/${state.examId}`);
        state.allQuestions = await qRes.json();

        // UI Transition
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('examPage').classList.remove('hidden');
        document.getElementById('userDisplayName').innerText = 
            `${data.firstName} ${data.lastName} (${regNumber.toUpperCase()})`;
        
        renderTabs();
        renderQuestion();
        startTimer();

    } catch (err) {
        errorEl.innerText = "Server connection failed. Please try again.";
        btn.disabled = false;
    }
}
    

    function renderTabs() {
        const container = document.getElementById('subjectTabs');
        container.innerHTML = state.allQuestions.map((item, idx) => `
            <div class="tab ${idx === state.currentSubIndex ? 'active-tab' : ''}" onclick="switchSubject(${idx})">
                ${item.subject}
            </div>
        `).join('');
    }

    function switchSubject(idx) {
        state.currentSubIndex = idx;
        state.currentQIndex = 0;
        renderTabs();
        renderQuestion();
    }

    function renderQuestion() {
        const subjectData = state.allQuestions[state.currentSubIndex];
        const q = subjectData.questions[state.currentQIndex];
        const questionArea = document.getElementById('questionArea');

        let html = `
            <small>Subject: ${subjectData.subject} | Question ${state.currentQIndex + 1}</small>
            <p style="font-size: 1.2rem; margin: 20px 0;">${q.questionText}</p>
        `;

        q.options.forEach(opt => {
            const isSelected = state.answers[q._id] === opt.key;
            html += `
                <div class="option ${isSelected ? 'selected' : ''}" onclick="saveAnswer('${q._id}', '${opt.key}')">
                    <span class="opt-key">${opt.key}</span>
                    <span>${opt.value}</span>
                </div>
            `;
        });

        questionArea.innerHTML = html;
        renderGrid();
    }

    function renderGrid() {
        const questions = state.allQuestions[state.currentSubIndex].questions;
        const grid = document.getElementById('questionGrid');
        grid.innerHTML = questions.map((q, i) => `
            <div class="q-circle ${state.answers[q._id] ? 'answered' : ''} ${i === state.currentQIndex ? 'current' : ''}" 
                 onclick="jumpTo(${i})">${i + 1}</div>
        `).join('');
    }

    async function saveAnswer(qId, key) {
        state.answers[qId] = key;
        renderQuestion();
        
        // Silent background save
        fetch(`${BASE_URL}/save-answer`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ examId: state.examId, questionId: qId, selectedOptionKey: key })
        });
    }

    function jumpTo(i) { state.currentQIndex = i; renderQuestion(); }
    function nextQuestion() { 
        if(state.currentQIndex < state.allQuestions[state.currentSubIndex].questions.length - 1) {
            state.currentQIndex++; renderQuestion();
        }
    }
    function prevQuestion() {
        if(state.currentQIndex > 0) {
            state.currentQIndex--; renderQuestion();
        }
    }

    function startTimer() {
        const timerEl = document.getElementById('timer');
        const interval = setInterval(() => {
            state.timeLeft--;
            let h = Math.floor(state.timeLeft / 3600);
            let m = Math.floor((state.timeLeft % 3600) / 60);
            let s = state.timeLeft % 60;
            timerEl.innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            
            if(state.timeLeft <= 0) { clearInterval(interval); confirmSubmit(); }
        }, 1000);
    }

    async function confirmSubmit() {
        if(!confirm("Are you sure you want to submit?")) return;
        
        const res = await fetch(`${BASE_URL}/submit-exam`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ examId: state.examId })
        });
        const result = await res.json();
        
        showResults(result);
    }

    function showResults(data) {
        document.getElementById('examPage').classList.add('hidden');
        document.getElementById('resultPage').classList.remove('hidden');
        document.getElementById('scoreCircle').innerText = `${data.aggregateScore} / 400`;
        
        const body = document.getElementById('resultBody');
        body.innerHTML = data.subjectResults.map(r => `
            <tr>
                <td>${r.subjectName}</td>
                <td>${r.weightedScore} / 100 <small>(${r.correctCount} correct)</small></td>
            </tr>
        `).join('');
    }
</script>
</body>
</html>
