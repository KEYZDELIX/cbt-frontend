<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body>

<h2>Admin Panel</h2>

<h3>Add Question</h3>

<textarea id="question" placeholder="Enter question (LaTeX supported)"></textarea><br><br>

<input id="opt1" placeholder="Option 1"><br>
<input id="opt2" placeholder="Option 2"><br>
<input id="opt3" placeholder="Option 3"><br>
<input id="opt4" placeholder="Option 4"><br><br>

<input id="answer" placeholder="Correct Answer"><br><br>

<button onclick="addQuestion()">Add Question</button>

<h3>Results</h3>
<button onclick="loadResults()">Load Results</button>

<div id="results"></div>

<script>
const BASE_URL = "https://cbt-backend-mgqe.onrender.com";

async function addQuestion() {
  const question = document.getElementById("question").value;
  const options = [
    opt1.value, opt2.value, opt3.value, opt4.value
  ];
  const answer = document.getElementById("answer").value;

  await fetch(BASE_URL + "/questions", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ question, options, answer })
  });

  alert("Question added!");
}

async function loadResults() {
  const res = await fetch(BASE_URL + "/results");
  const data = await res.json();

  document.getElementById("results").innerHTML = data.map(r => `
    <p>${r.name} - Score: ${r.score}</p>
  `).join("");
}
</script>

</body>
</html>
