<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT Admin | Management Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --sidebar-width: 260px;
            --primary-bg: #f8fafc;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        body { background-color: var(--primary-bg); margin: 0; font-family: 'Segoe UI', sans-serif; }
        
        .admin-container { display: flex; min-height: 100vh; }

        /* Sidebar Styling */
        .sidebar { 
            width: var(--sidebar-width); 
            background: #1e293b; 
            color: #f1f5f9; 
            padding: 24px; 
            position: fixed;
            height: 100vh;
        }
        .sidebar h2 { font-size: 1.1rem; color: #38bdf8; letter-spacing: 1px; margin-bottom: 40px; text-transform: uppercase; }
        .nav-item { 
            padding: 14px 18px; 
            cursor: pointer; 
            border-radius: 8px; 
            transition: all 0.2s; 
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            font-weight: 500;
            color: #94a3b8;
        }
        .nav-item:hover { background: #334155; color: white; }
        .nav-item.active { background: #0ea5e9; color: white; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3); }
        
        /* Main Content */
        .main-content { 
            flex: 1; 
            margin-left: var(--sidebar-width); 
            padding: 40px; 
            max-width: 1200px;
        }

        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: var(--card-shadow);
            margin-bottom: 30px;
        }

        h3 { margin-top: 0; color: #1e293b; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 25px; }

        /* Form Grid Optimization */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .full-width { grid-column: span 2; }

        .input-group label { display: block; font-size: 0.9rem; font-weight: 600; color: #64748b; margin-bottom: 8px; }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        textarea.rich-input { min-height: 120px; resize: vertical; }

        /* Options Layout */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            background: #f1f5f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .option-row {
            display: grid;
            grid-template-columns: 40px 1fr 1fr;
            gap: 12px;
            align-items: center;
        }

        /* Results Table Enhancement */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th { background: #f8fafc; color: #64748b; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; padding: 15px; }
        td { padding: 15px; border-top: 1px solid #f1f5f9; color: #334155; }
        tr:hover { background: #fdfdfd; }

        .badge { padding: 4px 10px; border-radius: 99px; font-size: 0.8rem; }
        .btn-save { 
            background: #0ea5e9; 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600;
            width: 200px;
        }
        .btn-save:hover { background: #0284c7; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="admin-container">
    <aside class="sidebar">
        <h2>STT ADMIN</h2>
        <div class="nav-item active" onclick="showTab('addQuestions')">📝 Add Questions</div>
        <div class="nav-item" onclick="showTab('addUsers')">👥 Manage Users</div>
        <div class="nav-item" onclick="showTab('results')">📊 View Results</div>
        <div class="nav-item" style="margin-top: 50px; color: #f87171;" onclick="window.location.href='index.html'">🚪 Logout</div>
    </aside>

    <main class="main-content">
        
        <section id="addQuestions" class="tab-content">
            <div class="card">
                <h3>Question Editor</h3>
                <div class="form-grid">
                    <div class="input-group">
                        <label>Subject</label>
                        <select id="qSubject">
                            <option>Use of English</option>
                            <option>Mathematics</option>
                            <option>Physics</option>
                            <option>Chemistry</option>
                            <option>Biology</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Topic</label>
                        <input type="text" id="qTopic" placeholder="e.g. Organic Chemistry">
                    </div>
                    <div class="input-group full-width">
                        <label>Question Body (Supports LaTeX $...$)</label>
                        <textarea id="qText" class="rich-input" placeholder="Enter question here..."></textarea>
                    </div>
                    <div class="input-group full-width">
                        <label>Image URL (Optional)</label>
                        <input type="text" id="qImage" placeholder="https://image-link.com/photo.jpg">
                    </div>
                </div>

                <label style="font-weight: 600; color: #64748b; margin-bottom: 10px; display: block;">Options & Correct Answer</label>
                <div class="options-grid">
                    <div class="option-row">
                        <input type="radio" name="correct" value="A" checked>
                        <input type="text" id="optA" placeholder="Option A text">
                        <input type="text" id="optAImg" placeholder="A Image URL">
                    </div>
                    <div class="option-row">
                        <input type="radio" name="correct" value="B">
                        <input type="text" id="optB" placeholder="Option B text">
                        <input type="text" id="optBImg" placeholder="B Image URL">
                    </div>
                    <div class="option-row">
                        <input type="radio" name="correct" value="C">
                        <input type="text" id="optC" placeholder="Option C text">
                        <input type="text" id="optCImg" placeholder="C Image URL">
                    </div>
                    <div class="option-row">
                        <input type="radio" name="correct" value="D">
                        <input type="text" id="optD" placeholder="Option D text">
                        <input type="text" id="optDImg" placeholder="D Image URL">
                    </div>
                </div>

                <button class="btn-save" onclick="saveQuestion()">Save Question</button>

                <div id="previewArea" style="margin-top: 30px; padding: 20px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px;">
                    <strong style="color: #92400e;">Live Math Preview:</strong>
                    <div id="mathPreview" style="margin-top: 10px;"></div>
                </div>
            </div>
        </section>

        <section id="addUsers" class="tab-content hidden">
            <div class="card">
                <h3>Student Enrollment</h3>
                <div class="form-grid">
                    <div class="input-group">
                        <label>First Name</label>
                        <input type="text" id="uFirst" placeholder="John">
                    </div>
                    <div class="input-group">
                        <label>Last Name</label>
                        <input type="text" id="uLast" placeholder="Doe">
                    </div>
                    <div class="input-group">
                        <label>Set Password/PIN</label>
                        <input type="password" id="uPass" placeholder="Numeric PIN or Password">
                    </div>
                    <div class="input-group">
                        <label>Course Combination (Select 3 + English)</label>
                        <select id="uSubs" multiple style="height: 120px;">
                            <option>Mathematics</option><option>Physics</option><option>Chemistry</option>
                            <option>Biology</option><option>Economics</option><option>Government</option>
                            <option>Literature</option><option>CRK</option>
                        </select>
                        <small style="color: #94a3b8;">Hold Ctrl/Cmd to select multiple</small>
                    </div>
                </div>
                <button class="btn-save" onclick="registerUser()">Create Account</button>
            </div>
        </section>

        <section id="results" class="tab-content hidden">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3>Exam Performance</h3>
                    <button class="btn-save" style="width: auto;" onclick="fetchResults()">🔄 Refresh Table</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>S/N</th>
                                <th>Reg No</th>
                                <th>Full Name</th>
                                <th>Subject Scores</th>
                                <th>Aggregate</th>
                            </tr>
                        </thead>
                        <tbody id="adminResultBody"></tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>
</div>

<script>
    const BASE_URL = "https://cbt-backend-mgqe.onrender.com"; 

    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(tabId).classList.remove('hidden');
        event.currentTarget.classList.add('active');
        if(tabId === 'results') fetchResults();
    }

    // MathJax Preview Logic
    const qTextInput = document.getElementById('qText');
    qTextInput.addEventListener('input', () => {
        const preview = document.getElementById('mathPreview');
        preview.innerHTML = qTextInput.value.replace(/\n/g, '<br>');
        if(window.MathJax) MathJax.typesetPromise();
    });

    async function saveQuestion() {
        const btn = event.target;
        btn.disabled = true;
        btn.innerText = "Saving...";

        const data = {
            subject: document.getElementById('qSubject').value,
            topic: document.getElementById('qTopic').value,
            questionText: qTextInput.value,
            questionImage: document.getElementById('qImage').value,
            options: [
                { key: 'A', value: document.getElementById('optA').value, optionImage: document.getElementById('optAImg').value },
                { key: 'B', value: document.getElementById('optB').value, optionImage: document.getElementById('optBImg').value },
                { key: 'C', value: document.getElementById('optC').value, optionImage: document.getElementById('optCImg').value },
                { key: 'D', value: document.getElementById('optD').value, optionImage: document.getElementById('optDImg').value }
            ],
            correctOptionKey: document.querySelector('input[name="correct"]:checked').value,
            weight: 1
        };

        try {
            const res = await fetch(`${BASE_URL}/questions`, {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify(data)
            });
            if(res.ok) alert("Question stored in database!");
        } catch (e) { alert("Server error"); }
        
        btn.disabled = false;
        btn.innerText = "Save Question";
    }

    async function registerUser() {
        const payload = {
            firstName: document.getElementById('uFirst').value,
            lastName: document.getElementById('uLast').value,
            password: document.getElementById('uPass').value,
            subjects: Array.from(document.getElementById('uSubs').selectedOptions).map(o => o.value)
        };

        try {
            const res = await fetch(`${BASE_URL}/admin/register-user`, {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            alert(`Student Registered! Reg No: ${data.regNumber}`);
        } catch (e) { alert("Registration failed"); }
    }

    async function fetchResults() {
        try {
            const res = await fetch(`${BASE_URL}/all-results`);
            const data = await res.json();
            const body = document.getElementById('adminResultBody');
            
            body.innerHTML = data.map((r, i) => `
                <tr>
                    <td>${i + 1}</td>
                    <td><strong>${r.userId?.regNumber || 'N/A'}</strong></td>
                    <td>${r.userId?.lastName || ''}, ${r.userId?.firstName || 'User'}</td>
                    <td>
                        ${r.subjectResults.map(sr => `<span class="badge" style="background:#e0f2fe; color:#0369a1">${sr.weightedScore}</span>`).join(' ')}
                    </td>
                    <td><strong style="color:#059669">${r.aggregateScore}</strong></td>
                </tr>
            `).join('');
        } catch (e) { console.error("Results load error", e); }
    }
</script>
</body>
</html>
